<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Log Engine Telemetry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>Pipeline Telemetry</h1>
        <div class="status">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <div class="grid">
        <div class="card" id="card-throughput">
            <h2>System Throughput (Logs/Sec)</h2>
            <div class="value" id="val-throughput">0</div>
            <div class="chart-container">
                <canvas id="chart-throughput"></canvas>
            </div>
        </div>

        <div class="card" id="card-queue">
            <h2>Main Queue Depth</h2>
            <div class="value" id="val-queue">0</div>
            <div class="chart-container">
                <canvas id="chart-queue"></canvas>
            </div>
        </div>

        <div class="card" id="card-drops">
            <h2>Total Dropped Logs</h2>
            <div class="value" id="val-drops">0</div>
        </div>

        <div class="card" id="card-alerts">
            <h2>Anomalies Extracted</h2>
            <div class="value" id="val-alerts">0</div>
        </div>
    </div>

    <div class="diagnostic-desk">
        <h2>Live AI SRE Diagnostic Desk</h2>
        <div class="desk-content" id="diagnostic-content">
            <span id="diagnostic-default" style="color: #22c55e;">System Status: Nominal. Listening for cascading failures...</span>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
